name: Live Revit Smoke

on:
  workflow_dispatch:
    inputs:
      revit_year:
        description: Revit year to install the add-in manifest for.
        required: true
        default: "2024"
      revit_api_path:
        description: Directory containing RevitAPI.dll on the self-hosted runner.
        required: true
        default: C:\Program Files\Autodesk\Revit 2024
      revit_exe_path:
        description: Revit.exe path used for preflight and optional launch.
        required: true
        default: C:\Program Files\Autodesk\Revit 2024\Revit.exe
      launch_revit:
        description: Launch Revit if no Revit process is already running.
        required: true
        type: boolean
        default: false
      revit_model_path:
        description: Optional local RVT path to pass when launching Revit. Use a disposable project, not an RTE template.
        required: false
        default: ""
      document_fingerprint:
        description: Optional active document fingerprint expected by smoke:revit.
        required: false
        default: ""
      install_root:
        description: Optional install root. Empty uses %LOCALAPPDATA%\RevitMcpNext.
        required: false
        default: ""
      skip_install:
        description: Skip build/install and smoke the already installed add-in in an existing Revit session.
        required: true
        type: boolean
        default: false
      startup_wait_seconds:
        description: Seconds to wait after launching Revit before the smoke.
        required: true
        default: "90"
      collect_support_bundle:
        description: Collect the redacted support bundle after the run.
        required: true
        type: boolean
        default: true
      collect_host_integrations:
        description: Collect hosted pyRevit/Dynamo evidence before live smoke. Requires interactive Dynamo graph run.
        required: true
        type: boolean
        default: true
      pyrevit_path:
        description: Optional pyrevit.exe path for hosted pyRevit smoke.
        required: false
        default: ""
      seed_pyrevit_hosts:
        description: Seed pyRevit's per-user Revit host cache before hosted pyRevit smoke.
        required: true
        type: boolean
        default: false
      pyrevit_builds:
        description: Optional comma-separated Revit build ids for pyRevit host cache seeding.
        required: false
        default: ""
      dynamo_timeout_seconds:
        description: Seconds to wait for Dynamo-for-Revit host-smoke evidence.
        required: true
        default: "900"
      require_type_change:
        description: Fail unless the smoke can discover and apply an alternate compatible wall type.
        required: true
        type: boolean
        default: true
      require_room_tag:
        description: Fail unless the smoke can apply tag_room against a placed room.
        required: true
        type: boolean
        default: false
      require_element_tag:
        description: Fail unless the smoke can apply tag_element against a visible wall.
        required: true
        type: boolean
        default: false
      require_tags:
        description: Convenience switch to require both tag_room and tag_element coverage.
        required: true
        type: boolean
        default: true
      room_tag_type_id:
        description: Optional loaded room tag FamilySymbol id for curated tag smoke.
        required: false
        default: ""
      room_tag_type_name_contains:
        description: Optional loaded room tag FamilySymbol name/family substring for curated tag smoke.
        required: false
        default: ""
      element_tag_type_id:
        description: Optional loaded wall or multi-category tag FamilySymbol id for curated tag smoke.
        required: false
        default: ""
      element_tag_type_name_contains:
        description: Optional loaded wall or multi-category tag FamilySymbol name/family substring for curated tag smoke.
        required: false
        default: ""
      readiness_profile:
        description: Evidence readiness profile to enforce after collection.
        required: true
        default: release-candidate
      signing_mode:
        description: Package signing mode. Use none, local-dev, or release-cert.
        required: true
        default: none
      require_trusted_signatures:
        description: Fail signed packaging unless Authenticode signatures validate as trusted.
        required: true
        type: boolean
        default: true
      signing_no_timestamp:
        description: Sign without timestamping. Use only for local-dev/offline smoke certificates.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: live-revit-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Live Revit smoke
    runs-on: [self-hosted, Windows, revit]
    timeout-minutes: 90
    defaults:
      run:
        shell: powershell
    env:
      EVIDENCE_DIR: artifacts\live-revit-smoke
      REVIT_YEAR: ${{ inputs.revit_year }}
      REVIT_API_PATH: ${{ inputs.revit_api_path }}
      REVIT_EXE_PATH: ${{ inputs.revit_exe_path }}
      REVIT_MODEL_PATH: ${{ inputs.revit_model_path }}
      INSTALL_ROOT_INPUT: ${{ inputs.install_root }}
      DOCUMENT_FINGERPRINT: ${{ inputs.document_fingerprint }}
      STARTUP_WAIT_SECONDS: ${{ inputs.startup_wait_seconds }}
      COLLECT_HOST_INTEGRATIONS: ${{ inputs.collect_host_integrations }}
      PYREVIT_PATH: ${{ inputs.pyrevit_path }}
      SEED_PYREVIT_HOSTS: ${{ inputs.seed_pyrevit_hosts }}
      PYREVIT_BUILDS: ${{ inputs.pyrevit_builds }}
      DYNAMO_TIMEOUT_SECONDS: ${{ inputs.dynamo_timeout_seconds }}
      REQUIRE_TYPE_CHANGE: ${{ inputs.require_type_change }}
      REQUIRE_ROOM_TAG: ${{ inputs.require_room_tag }}
      REQUIRE_ELEMENT_TAG: ${{ inputs.require_element_tag }}
      REQUIRE_TAGS: ${{ inputs.require_tags }}
      ROOM_TAG_TYPE_ID: ${{ inputs.room_tag_type_id }}
      ROOM_TAG_TYPE_NAME_CONTAINS: ${{ inputs.room_tag_type_name_contains }}
      ELEMENT_TAG_TYPE_ID: ${{ inputs.element_tag_type_id }}
      ELEMENT_TAG_TYPE_NAME_CONTAINS: ${{ inputs.element_tag_type_name_contains }}
      READINESS_PROFILE: ${{ inputs.readiness_profile }}
      SIGNING_MODE: ${{ inputs.signing_mode }}
      REQUIRE_TRUSTED_SIGNATURES: ${{ inputs.require_trusted_signatures }}
      SIGNING_NO_TIMESTAMP: ${{ inputs.signing_no_timestamp }}
      REVIT_MCP_NEXT_SIGN_CERT_THUMBPRINT: ${{ secrets.REVIT_MCP_NEXT_SIGN_CERT_THUMBPRINT }}
      REVIT_MCP_NEXT_SIGN_CERT_PATH: ${{ secrets.REVIT_MCP_NEXT_SIGN_CERT_PATH }}
      REVIT_MCP_NEXT_SIGN_CERT_PASSWORD: ${{ secrets.REVIT_MCP_NEXT_SIGN_CERT_PASSWORD }}
      REVIT_MCP_NEXT_TIMESTAMP_URL: ${{ secrets.REVIT_MCP_NEXT_TIMESTAMP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Prepare evidence directory
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path $env:EVIDENCE_DIR | Out-Null

          if ([string]::IsNullOrWhiteSpace($env:INSTALL_ROOT_INPUT)) {
            if ([string]::IsNullOrWhiteSpace($env:LOCALAPPDATA)) {
              throw "LOCALAPPDATA is not set; provide the install_root workflow input."
            }
            $installRoot = Join-Path $env:LOCALAPPDATA "RevitMcpNext"
          } else {
            $installRoot = [Environment]::ExpandEnvironmentVariables($env:INSTALL_ROOT_INPUT)
          }

          $installRoot = [System.IO.Path]::GetFullPath($installRoot)
          $launcherPath = Join-Path $installRoot "launch-revit-mcp-next.cmd"
          $authConfigPath = Join-Path $installRoot "config\auth.env"

          "INSTALL_ROOT=$installRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LAUNCHER_PATH=$launcherPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REVIT_MCP_NEXT_AUTH_CONFIG=$authConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $summary = [ordered] @{
            revitYear = $env:REVIT_YEAR
            revitApiPath = $env:REVIT_API_PATH
            revitExePath = $env:REVIT_EXE_PATH
            installRoot = $installRoot
            authConfigPath = $authConfigPath
            launchRevit = "${{ inputs.launch_revit }}"
            skipInstall = "${{ inputs.skip_install }}"
            signingMode = $env:SIGNING_MODE
            requireTrustedSignatures = $env:REQUIRE_TRUSTED_SIGNATURES
            requireTypeChange = $env:REQUIRE_TYPE_CHANGE
            requireRoomTag = $env:REQUIRE_ROOM_TAG
            requireElementTag = $env:REQUIRE_ELEMENT_TAG
            requireTags = $env:REQUIRE_TAGS
            roomTagTypeId = $env:ROOM_TAG_TYPE_ID
            roomTagTypeNameContains = $env:ROOM_TAG_TYPE_NAME_CONTAINS
            elementTagTypeId = $env:ELEMENT_TAG_TYPE_ID
            elementTagTypeNameContains = $env:ELEMENT_TAG_TYPE_NAME_CONTAINS
            readinessProfile = $env:READINESS_PROFILE
            signingNoTimestamp = $env:SIGNING_NO_TIMESTAMP
            runnerName = $env:RUNNER_NAME
            runnerOs = $env:RUNNER_OS
          }
          $summary | ConvertTo-Json -Depth 4 | Set-Content -Path (Join-Path $env:EVIDENCE_DIR "run-inputs.json") -Encoding UTF8

      - name: Validate release profile inputs
        run: |
          $ErrorActionPreference = "Stop"
          $profile = $env:READINESS_PROFILE.Trim().ToLowerInvariant()
          if ($profile -notin @("external-preview", "release-candidate", "production")) {
            throw "readiness_profile must be one of: external-preview, release-candidate, production. Received: $env:READINESS_PROFILE"
          }

          if ($profile -in @("release-candidate", "production")) {
            if ("${{ inputs.skip_install }}" -eq "true") {
              throw "readiness_profile=$profile requires building, packaging, and installing the current checkout. Set skip_install=false or use readiness_profile=external-preview."
            }
            if ($env:COLLECT_HOST_INTEGRATIONS -ne "true") {
              throw "readiness_profile=$profile requires collect_host_integrations=true so pyRevit and Dynamo host evidence is captured."
            }
            if ("${{ inputs.collect_support_bundle }}" -ne "true") {
              throw "readiness_profile=$profile requires collect_support_bundle=true."
            }
            if ($env:REQUIRE_TAGS -ne "true" -and -not ($env:REQUIRE_ROOM_TAG -eq "true" -and $env:REQUIRE_ELEMENT_TAG -eq "true")) {
              throw "readiness_profile=$profile requires both tag_room and tag_element live-smoke coverage. Set require_tags=true or both individual tag requirements."
            }
          }

          if ($env:SIGNING_MODE.Trim().ToLowerInvariant() -eq "release-cert" -and $env:SIGNING_NO_TIMESTAMP -eq "true") {
            throw "signing_no_timestamp=true is not allowed with signing_mode=release-cert."
          }

      - name: Preflight Revit runner
        run: |
          $ErrorActionPreference = "Stop"
          $apiDll = Join-Path $env:REVIT_API_PATH "RevitAPI.dll"
          $apiUiDll = Join-Path $env:REVIT_API_PATH "RevitAPIUI.dll"
          $preflight = [ordered] @{
            revitApiDll = $apiDll
            revitApiDllExists = Test-Path -LiteralPath $apiDll -PathType Leaf
            revitApiUiDll = $apiUiDll
            revitApiUiDllExists = Test-Path -LiteralPath $apiUiDll -PathType Leaf
            revitExePath = $env:REVIT_EXE_PATH
            revitExeExists = Test-Path -LiteralPath $env:REVIT_EXE_PATH -PathType Leaf
          }
          $preflight | ConvertTo-Json -Depth 4 | Set-Content -Path (Join-Path $env:EVIDENCE_DIR "preflight.json") -Encoding UTF8

          if (-not $preflight.revitApiDllExists) {
            throw "RevitAPI.dll was not found at $apiDll. Use a self-hosted Windows runner with Revit installed."
          }
          if (-not $preflight.revitApiUiDllExists) {
            throw "RevitAPIUI.dll was not found at $apiUiDll. Use a self-hosted Windows runner with Revit installed."
          }
          if (-not $preflight.revitExeExists) {
            throw "Revit.exe was not found at $env:REVIT_EXE_PATH. Configure revit_exe_path for this runner."
          }

          Write-Host "Revit API path verified: $env:REVIT_API_PATH"
          Write-Host "Revit executable verified: $env:REVIT_EXE_PATH"

      - name: Install dependencies
        if: ${{ !inputs.skip_install }}
        run: |
          $ErrorActionPreference = "Stop"
          $log = Join-Path $env:EVIDENCE_DIR "npm-ci.log"
          & npm.cmd ci 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            throw "npm ci failed with exit code $LASTEXITCODE."
          }

      - name: Build and package current repo
        if: ${{ !inputs.skip_install }}
        run: |
          $ErrorActionPreference = "Stop"

          $buildLog = Join-Path $env:EVIDENCE_DIR "npm-build.log"
          & npm.cmd run build 2>&1 | Tee-Object -FilePath $buildLog
          if ($LASTEXITCODE -ne 0) {
            throw "npm run build failed with exit code $LASTEXITCODE."
          }

          $addinLog = Join-Path $env:EVIDENCE_DIR "build-addin.log"
          & npm.cmd run build:addin -- -RevitApiPath $env:REVIT_API_PATH 2>&1 | Tee-Object -FilePath $addinLog
          if ($LASTEXITCODE -ne 0) {
            throw "npm run build:addin failed with exit code $LASTEXITCODE."
          }

          $validateLog = Join-Path $env:EVIDENCE_DIR "validate-repo.log"
          & node.exe scripts\validate-repo.mjs 2>&1 | Tee-Object -FilePath $validateLog
          if ($LASTEXITCODE -ne 0) {
            throw "validate-repo.mjs failed with exit code $LASTEXITCODE."
          }

          $signingMode = $env:SIGNING_MODE.Trim().ToLowerInvariant()
          if ($signingMode -notin @("none", "local-dev", "release-cert")) {
            throw "signing_mode must be one of: none, local-dev, release-cert. Received: $env:SIGNING_MODE"
          }

          $packageOutputRoot = "artifacts\release-candidate"
          $packageLog = Join-Path $env:EVIDENCE_DIR "package-release.log"
          $packageArgs = @("run", "package:windows", "--", "-OutputRoot", $packageOutputRoot, "-RevitYears", $env:REVIT_YEAR)

          if ($signingMode -eq "local-dev") {
            $devCertJsonPath = Join-Path $env:EVIDENCE_DIR "dev-signing-certificate.json"
            $devCertLogPath = Join-Path $env:EVIDENCE_DIR "dev-signing-certificate.log"
            "Command: scripts\ensure-dev-signing-certificate.ps1 -Trust -AutoApproveRootTrustPrompt -Json" | Set-Content -LiteralPath $devCertLogPath -Encoding UTF8
            $devCertJson = & powershell -NoProfile -ExecutionPolicy Bypass -File scripts\ensure-dev-signing-certificate.ps1 -Trust -AutoApproveRootTrustPrompt -Json 2>&1
            $devCertJson | Tee-Object -FilePath $devCertLogPath -Append | Set-Content -LiteralPath $devCertJsonPath -Encoding UTF8
            if ($LASTEXITCODE -ne 0) {
              throw "Local dev signing certificate setup failed with exit code $LASTEXITCODE. See $devCertLogPath"
            }

            $devCertState = ($devCertJson | Out-String) | ConvertFrom-Json
            if ([string]::IsNullOrWhiteSpace([string] $devCertState.thumbprint)) {
              throw "Local dev signing certificate helper did not return a thumbprint."
            }
            if (-not [bool] $devCertState.trusted.rootPresent -or -not [bool] $devCertState.trusted.trustedPublisherPresent) {
              throw "Local dev signing certificate is not trusted in CurrentUser Root and TrustedPublisher stores."
            }

            $packageArgs += @(
              "-Sign",
              "-RequireSigned",
              "-RequireTrustedSignatures",
              "-SigningCertificateThumbprint",
              ([string] $devCertState.thumbprint),
              "-NoTimestamp"
            )
          } elseif ($signingMode -eq "release-cert") {
            if ([string]::IsNullOrWhiteSpace($env:REVIT_MCP_NEXT_SIGN_CERT_THUMBPRINT) -and [string]::IsNullOrWhiteSpace($env:REVIT_MCP_NEXT_SIGN_CERT_PATH)) {
              throw "signing_mode=release-cert requires REVIT_MCP_NEXT_SIGN_CERT_THUMBPRINT or REVIT_MCP_NEXT_SIGN_CERT_PATH from runner environment or repository secrets."
            }

            $packageArgs += @("-Sign", "-RequireSigned")
            if ($env:REQUIRE_TRUSTED_SIGNATURES -eq "true") {
              $packageArgs += "-RequireTrustedSignatures"
            }
            if ($env:SIGNING_NO_TIMESTAMP -eq "true") {
              $packageArgs += "-NoTimestamp"
            }
          }

          & npm.cmd @packageArgs 2>&1 | Tee-Object -FilePath $packageLog
          if ($LASTEXITCODE -ne 0) {
            throw "npm run package:windows failed with exit code $LASTEXITCODE."
          }

          $version = (Get-Content -LiteralPath "package.json" -Raw | ConvertFrom-Json).version
          $packageRoot = Join-Path $packageOutputRoot "revit-mcp-next-$version-windows"
          if (-not (Test-Path -LiteralPath $packageRoot -PathType Container)) {
            throw "Expected package root was not created: $packageRoot"
          }
          $packageRoot = (Resolve-Path -LiteralPath $packageRoot).Path
          "PACKAGE_ROOT=$packageRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Copy-Item -LiteralPath (Join-Path $packageRoot "release-manifest.json") -Destination (Join-Path $env:EVIDENCE_DIR "release-manifest.json") -Force
          Copy-Item -LiteralPath (Join-Path $packageRoot "CHECKSUMS.sha256") -Destination (Join-Path $env:EVIDENCE_DIR "CHECKSUMS.sha256") -Force

      - name: Install staged package
        if: ${{ !inputs.skip_install }}
        run: |
          $ErrorActionPreference = "Stop"
          $existing = Get-Process -Name Revit -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($existing) {
            throw "Revit is already running as process id $($existing.Id). Close Revit before installing the current checkout, or rerun with skip_install=true to smoke the already installed add-in."
          }

          $log = Join-Path $env:EVIDENCE_DIR "install-windows.log"
          $installer = Join-Path $env:PACKAGE_ROOT "installer\install-windows.ps1"
          & powershell -NoProfile -ExecutionPolicy Bypass -File $installer -PackageRoot $env:PACKAGE_ROOT -RevitYears $env:REVIT_YEAR -InstallRoot $env:INSTALL_ROOT 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            throw "package install failed with exit code $LASTEXITCODE."
          }

      - name: Collect hosted pyRevit and Dynamo evidence
        if: ${{ inputs.collect_host_integrations }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:REVIT_MODEL_PATH)) {
            throw "collect_host_integrations=true requires revit_model_path so pyRevit and Dynamo use the same disposable model."
          }
          if (-not (Test-Path -LiteralPath $env:REVIT_MODEL_PATH -PathType Leaf)) {
            throw "Configured revit_model_path was not found: $env:REVIT_MODEL_PATH"
          }

          $running = Get-Process -Name Revit -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($running) {
            throw "collect_host_integrations=true requires Revit to be closed before this step so Dynamo smoke can launch Revit with evidence environment variables. Running process id: $($running.Id)"
          }

          $hostRoot = Join-Path $env:EVIDENCE_DIR "host-integrations"
          $log = Join-Path $env:EVIDENCE_DIR "host-integrations.log"
          $hostArgs = @(
            "run", "smoke:host-integrations", "--",
            "-RevitYear", $env:REVIT_YEAR,
            "-InstallRoot", $env:INSTALL_ROOT,
            "-ModelPath", $env:REVIT_MODEL_PATH,
            "-OutputRoot", $hostRoot,
            "-LaunchRevitForDynamo",
            "-DynamoRevitPath", $env:REVIT_EXE_PATH,
            "-DynamoTimeoutSeconds", $env:DYNAMO_TIMEOUT_SECONDS
          )
          if (-not [string]::IsNullOrWhiteSpace($env:PYREVIT_PATH)) {
            $hostArgs += @("-PyRevitPath", $env:PYREVIT_PATH)
          }
          if ($env:SEED_PYREVIT_HOSTS -eq "true") {
            $hostArgs += "-SeedPyRevitHosts"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:PYREVIT_BUILDS)) {
            $hostArgs += @("-PyRevitBuilds", $env:PYREVIT_BUILDS)
          }

          & npm.cmd @hostArgs 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            throw "npm run smoke:host-integrations failed with exit code $LASTEXITCODE."
          }

      - name: Ensure Revit is running
        run: |
          $ErrorActionPreference = "Stop"
          $log = Join-Path $env:EVIDENCE_DIR "revit-process.log"

          function Write-RunLog {
            param([string] $Message)
            $Message | Tee-Object -FilePath $log -Append
          }

          $existing = Get-Process -Name Revit -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($existing) {
            Write-RunLog "Revit is already running as process id $($existing.Id). The workflow will not restart it."
            Write-RunLog "Confirm the active Revit session has loaded the current add-in, has a disposable project document open, and was started with REVIT_MCP_NEXT_AUTH_CONFIG=$env:REVIT_MCP_NEXT_AUTH_CONFIG when using a custom install root."
            exit 0
          }

          if ("${{ inputs.launch_revit }}" -ne "true") {
            throw "Revit is not running. Open Revit with an active disposable project, or dispatch with launch_revit=true."
          }

          $argumentList = @()
          if (-not [string]::IsNullOrWhiteSpace($env:REVIT_MODEL_PATH)) {
            if (-not (Test-Path -LiteralPath $env:REVIT_MODEL_PATH -PathType Leaf)) {
              throw "Configured revit_model_path was not found: $env:REVIT_MODEL_PATH"
            }
            $argumentList += "`"$env:REVIT_MODEL_PATH`""
            Write-RunLog "Launching Revit with the configured model path."
          } else {
            throw "launch_revit=true requires revit_model_path so the smoke has an active disposable project document."
          }

          if ($argumentList.Count -gt 0) {
            Start-Process -FilePath $env:REVIT_EXE_PATH -ArgumentList $argumentList
          } else {
            Start-Process -FilePath $env:REVIT_EXE_PATH
          }

          $startupWait = 90
          if (-not [string]::IsNullOrWhiteSpace($env:STARTUP_WAIT_SECONDS)) {
            $startupWait = [int] $env:STARTUP_WAIT_SECONDS
          }
          if ($startupWait -lt 0 -or $startupWait -gt 900) {
            throw "startup_wait_seconds must be between 0 and 900."
          }

          $deadline = (Get-Date).AddSeconds([Math]::Max($startupWait, 30))
          do {
            Start-Sleep -Seconds 5
            $started = Get-Process -Name Revit -ErrorAction SilentlyContinue | Select-Object -First 1
          } while (-not $started -and (Get-Date) -lt $deadline)

          if (-not $started) {
            throw "Revit did not start before the wait deadline."
          }

          Write-RunLog "Revit started as process id $($started.Id). Waiting $startupWait seconds before diagnostics."
          if ($startupWait -gt 0) {
            Start-Sleep -Seconds $startupWait
          }

      - name: Run doctor
        run: |
          $ErrorActionPreference = "Stop"
          $log = Join-Path $env:EVIDENCE_DIR "doctor-windows.log"
          & npm.cmd run doctor:windows -- -InstallRoot $env:INSTALL_ROOT -RevitYear $env:REVIT_YEAR 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            throw "npm run doctor:windows failed with exit code $LASTEXITCODE."
          }

      - name: Run live Revit smoke
        run: |
          $ErrorActionPreference = "Stop"
          $log = Join-Path $env:EVIDENCE_DIR "smoke-revit.log"
          $smokeSummaryPath = Join-Path $env:EVIDENCE_DIR "smoke-summary.json"
          $smokeArgs = @(
            "run", "smoke:revit", "--",
            "-LauncherPath", $env:LAUNCHER_PATH,
            "-ExpectedRevitYear", $env:REVIT_YEAR,
            "-SummaryPath", $smokeSummaryPath
          )
          if (-not [string]::IsNullOrWhiteSpace($env:DOCUMENT_FINGERPRINT)) {
            $smokeArgs += @("-DocumentFingerprint", $env:DOCUMENT_FINGERPRINT)
          }
          if ($env:REQUIRE_TYPE_CHANGE -eq "true") {
            $smokeArgs += @("-RequireTypeChange")
          }
          if ($env:REQUIRE_TAGS -eq "true") {
            $smokeArgs += @("-RequireTags")
          } else {
            if ($env:REQUIRE_ROOM_TAG -eq "true") {
              $smokeArgs += @("-RequireRoomTag")
            }
            if ($env:REQUIRE_ELEMENT_TAG -eq "true") {
              $smokeArgs += @("-RequireElementTag")
            }
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ROOM_TAG_TYPE_ID)) {
            $smokeArgs += @("-RoomTagTypeId", $env:ROOM_TAG_TYPE_ID)
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ROOM_TAG_TYPE_NAME_CONTAINS)) {
            $smokeArgs += @("-RoomTagTypeNameContains", $env:ROOM_TAG_TYPE_NAME_CONTAINS)
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ELEMENT_TAG_TYPE_ID)) {
            $smokeArgs += @("-ElementTagTypeId", $env:ELEMENT_TAG_TYPE_ID)
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ELEMENT_TAG_TYPE_NAME_CONTAINS)) {
            $smokeArgs += @("-ElementTagTypeNameContains", $env:ELEMENT_TAG_TYPE_NAME_CONTAINS)
          }

          & npm.cmd @smokeArgs 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            throw "npm run smoke:revit failed with exit code $LASTEXITCODE."
          }

      - name: Collect support bundle
        if: ${{ always() && inputs.collect_support_bundle }}
        run: |
          $ErrorActionPreference = "Continue"
          $log = Join-Path $env:EVIDENCE_DIR "support-bundle.log"
          $supportRoot = Join-Path $env:EVIDENCE_DIR "support"
          & npm.cmd run support:bundle -- -RevitYears $env:REVIT_YEAR -InstallRoot $env:INSTALL_ROOT -OutputRoot $supportRoot 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Support bundle collection failed with exit code $LASTEXITCODE. Continuing so existing logs can be uploaded."
          }

      - name: Collect release evidence
        if: ${{ always() && !inputs.skip_install }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_ROOT) -or -not (Test-Path -LiteralPath $env:PACKAGE_ROOT -PathType Container)) {
            Write-Warning "Skipping release evidence because PACKAGE_ROOT is unavailable."
            exit 0
          }

          $supportZip = Get-ChildItem -LiteralPath (Join-Path $env:EVIDENCE_DIR "support") -Filter "*.zip" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $releaseManifestPath = Join-Path $env:PACKAGE_ROOT "release-manifest.json"
          $signingRequested = $false
          if (Test-Path -LiteralPath $releaseManifestPath -PathType Leaf) {
            $releaseManifest = Get-Content -LiteralPath $releaseManifestPath -Raw | ConvertFrom-Json
            $signingRequested = [bool] $releaseManifest.signing.requested
          }

          $evidenceArgs = @(
            "run", "evidence:release:windows", "--",
            "-PackageRoot", $env:PACKAGE_ROOT,
            "-ValidateRepoLogPath", (Join-Path $env:EVIDENCE_DIR "validate-repo.log"),
            "-PackageLogPath", (Join-Path $env:EVIDENCE_DIR "package-release.log"),
            "-DoctorLogPath", (Join-Path $env:EVIDENCE_DIR "doctor-windows.log"),
            "-LiveSmokeEvidencePath", $env:EVIDENCE_DIR
          )
          if ($signingRequested) {
            $evidenceArgs += @("-SigningLogPath", (Join-Path $env:EVIDENCE_DIR "package-release.log"))
          } else {
            $evidenceArgs += @("-SigningSkipReason", "Workflow signing_mode was '$env:SIGNING_MODE' and this package was unsigned.")
          }
          if ($supportZip) {
            $evidenceArgs += @("-SupportBundlePath", $supportZip.FullName)
          } else {
            $evidenceArgs += @("-SupportBundleSkipReason", "Support bundle was not collected successfully for this workflow run.")
          }

          $hostIntegrationRoot = Join-Path $env:EVIDENCE_DIR "host-integrations"
          if (Test-Path -LiteralPath (Join-Path $hostIntegrationRoot "host-integrations-summary.json") -PathType Leaf) {
            $evidenceArgs += @("-HostedIntegrationEvidencePath", $hostIntegrationRoot)
            $hostCommandLogs = @(
              (Join-Path $env:EVIDENCE_DIR "host-integrations.log"),
              (Join-Path $hostIntegrationRoot "logs\pyrevit-host-smoke.log"),
              (Join-Path $hostIntegrationRoot "logs\dynamo-host-smoke.log"),
              (Join-Path $hostIntegrationRoot "logs\host-integrations-evidence.log")
            ) | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf }
            if ($hostCommandLogs.Count -gt 0) {
              $evidenceArgs += @("-CommandLogPaths") + $hostCommandLogs
            }
          } else {
            $evidenceArgs += @("-HostedIntegrationSkipReason", "Hosted pyRevit/Dynamo smoke was not collected by this workflow run.")
          }

          & npm.cmd @evidenceArgs 2>&1 | Tee-Object -FilePath (Join-Path $env:EVIDENCE_DIR "release-evidence.log")
          if ($LASTEXITCODE -ne 0) {
            throw "Release evidence collection failed with exit code $LASTEXITCODE."
          }

      - name: Check release readiness evidence
        if: ${{ !inputs.skip_install }}
        run: |
          $ErrorActionPreference = "Stop"
          $profile = $env:READINESS_PROFILE.Trim().ToLowerInvariant()
          if ($profile -notin @("external-preview", "release-candidate", "production")) {
            throw "readiness_profile must be one of: external-preview, release-candidate, production. Received: $env:READINESS_PROFILE"
          }

          $evidenceZip = Get-ChildItem -LiteralPath "artifacts\release-evidence" -Filter "*.zip" -Recurse -File -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $evidenceZip) {
            throw "Release evidence zip was not found under artifacts\release-evidence."
          }

          $log = Join-Path $env:EVIDENCE_DIR "readiness-check.log"
          & npm.cmd run evidence:check -- -EvidencePath $evidenceZip.FullName -Profile $profile 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            throw "Release readiness check failed with exit code $LASTEXITCODE for profile $profile."
          }

      - name: Upload smoke evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: live-revit-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/live-revit-smoke/**
            artifacts/release-candidate/**
            artifacts/release-evidence/**
          if-no-files-found: warn
          retention-days: 90
