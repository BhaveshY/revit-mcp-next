name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  broker:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: node scripts/validate-repo.mjs
      - name: Build .NET bridge contracts
        shell: pwsh
        run: dotnet build addin\RevitMcpNext.Contracts\RevitMcpNext.Contracts.csproj -c Release
      - name: Check installer dry run when Revit artifacts are present
        shell: pwsh
        run: |
          if (Test-Path "addin\RevitMcpNext.Addin\bin\Release\net48\RevitMcpNext.Addin.dll") {
            .\installer\install-windows.ps1 -DryRun -SkipDependencyInstall
          } else {
            Write-Host "Skipping installer dry run because Revit add-in artifacts are not available in CI."
          }
      - name: Build Revit add-in when Revit API is installed
        shell: pwsh
        run: |
          $revitApiPath = "C:\Program Files\Autodesk\Revit 2024"
          if (Test-Path "$revitApiPath\RevitAPI.dll") {
            .\scripts\build-addin.ps1 -RevitApiPath $revitApiPath
          } else {
            Write-Host "Skipping add-in build because Revit API DLLs are not installed on the runner."
          }
